static_site:
  buildCommand: npm run build
  staticPublishPath: dist
  headers:
    - path: /*
      name: X-Content-Type-Options
      value: nosniff
    - path: /*
      name: X-Frame-Options
      value: DENY
    - path: /*
      name: X-XSS-Protection
      value: 1; mode=block
  routes:
    - path: /*
      headers:
        Cache-Control: no-cache
